services:
  gitea-db:
    image: postgres:16.9-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${GITEA_DB_NAME}
      POSTGRES_USER: ${GITEA_DB_USER}
      POSTGRES_PASSWORD: ${GITEA_DB_PASSWORD}
    volumes:
      - gitea_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GITEA_DB_USER} -d ${GITEA_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gitea_private

  gitea:
    image: gitea/gitea:1.24.0
    restart: unless-stopped
    depends_on:
      gitea-db:
        condition: service_healthy
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: gitea-db:5432
      GITEA__database__NAME: ${GITEA_DB_NAME}
      GITEA__database__USER: ${GITEA_DB_USER}
      GITEA__database__PASSWD: ${GITEA_DB_PASSWORD}
      GITEA__server__DOMAIN: ${GITEA_DOMAIN}
      GITEA__server__ROOT_URL: ${GITEA_ROOT_URL}
      GITEA__server__SSH_DOMAIN: ${GITEA_SSH_DOMAIN}
      GITEA__server__HTTP_PORT: ${GITEA_HTTP_PORT:-3000}
      GITEA__server__SSH_PORT: ${GITEA_SSH_PORT:-2222}
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__service__REQUIRE_SIGNIN_VIEW: "true"
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__security__SECRET_KEY: ${GITEA_SECRET_KEY}
      GITEA__security__INTERNAL_TOKEN: ${GITEA_INTERNAL_TOKEN}
      GITEA__security__PASSWORD_HASH_ALGO: argon2
    volumes:
      - gitea_data:/data
    networks:
      - gitea_private
      - proxy

  gitea-init:
    image: gitea/gitea:1.24.0
    profiles:
      - setup
    depends_on:
      gitea-db:
        condition: service_healthy
    command:
      - /bin/sh
      - -lc
      - >
        gitea admin user create
        --admin
        --username "$$GITEA_ADMIN_USER"
        --password "$$GITEA_ADMIN_PASSWORD"
        --email "$$GITEA_ADMIN_EMAIL"
        || true
    environment:
      GITEA_WORK_DIR: /data
      GITEA_CUSTOM: /data/gitea
      GITEA_ADMIN_USER: ${GITEA_ADMIN_USER}
      GITEA_ADMIN_PASSWORD: ${GITEA_ADMIN_PASSWORD}
      GITEA_ADMIN_EMAIL: ${GITEA_ADMIN_EMAIL}
    volumes:
      - gitea_data:/data
    networks:
      - gitea_private

volumes:
  gitea_db:
  gitea_data:

networks:
  gitea_private:
    internal: true
  proxy:
    external: true
    name: company_proxy
