services:
  nextcloud-db:
    image: postgres:16.9-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${NEXTCLOUD_DB_NAME}
      POSTGRES_USER: ${NEXTCLOUD_DB_USER}
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
    volumes:
      - nextcloud_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NEXTCLOUD_DB_USER} -d ${NEXTCLOUD_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextcloud_private

  redis:
    image: redis:7.4.5-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks:
      - nextcloud_private

  nextcloud:
    image: nextcloud:31.0.4-apache
    restart: unless-stopped
    depends_on:
      nextcloud-db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      POSTGRES_HOST: nextcloud-db
      POSTGRES_DB: ${NEXTCLOUD_DB_NAME}
      POSTGRES_USER: ${NEXTCLOUD_DB_USER}
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
      REDIS_HOST: redis
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS}
      NEXTCLOUD_DATA_DIR: ${NEXTCLOUD_DATA_DIR:-/var/www/html/data}
      OVERWRITEHOST: ${NEXTCLOUD_DOMAIN}
      OVERWRITEPROTOCOL: https
      OVERWRITECLIURL: https://${NEXTCLOUD_DOMAIN}
    volumes:
      - nextcloud_html:/var/www/html
      - nextcloud_data:${NEXTCLOUD_DATA_DIR:-/var/www/html/data}
    networks:
      - nextcloud_private
      - proxy

  nextcloud-cron:
    image: nextcloud:31.0.4-apache
    restart: unless-stopped
    entrypoint: /cron.sh
    depends_on:
      nextcloud-db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      POSTGRES_HOST: nextcloud-db
      POSTGRES_DB: ${NEXTCLOUD_DB_NAME}
      POSTGRES_USER: ${NEXTCLOUD_DB_USER}
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
      REDIS_HOST: redis
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS}
      NEXTCLOUD_DATA_DIR: ${NEXTCLOUD_DATA_DIR:-/var/www/html/data}
      OVERWRITEHOST: ${NEXTCLOUD_DOMAIN}
      OVERWRITEPROTOCOL: https
      OVERWRITECLIURL: https://${NEXTCLOUD_DOMAIN}
    volumes:
      - nextcloud_html:/var/www/html
      - nextcloud_data:${NEXTCLOUD_DATA_DIR:-/var/www/html/data}
    networks:
      - nextcloud_private

  collabora:
    image: collabora/code:24.04.13.3.1
    restart: unless-stopped
    cap_add:
      - MKNOD
    environment:
      domain: ${NEXTCLOUD_DOMAIN_REGEX}
      username: ${COLLABORA_ADMIN_USER}
      password: ${COLLABORA_ADMIN_PASSWORD}
      extra_params: --o:ssl.enable=false --o:ssl.termination=true --o:net.post_allow.host[0]=${NEXTCLOUD_DOMAIN}
    networks:
      - proxy

volumes:
  nextcloud_db:
  nextcloud_html:
  nextcloud_data:

networks:
  nextcloud_private:
    internal: true
  proxy:
    external: true
    name: company_proxy
